<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecoAR - Demostración de Realidad Aumentada</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f7;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* Contenedor del visor 3D */
        model-viewer {
            width: 100%;
            height: 400px;
            background-color: #fafafa;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .btn-compra {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-compra:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DecoAR Virtual Store</h2>
    <p>Prueba el producto en tu espacio real antes de comprarlo.</p>
    
    <model-viewer 
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
    ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
    alt="Modelo 3D de prueba" 
    ar 
    ar-modes="webxr" 
    ar-scale="auto"
    camera-controls 
    shadow-intensity="1">
    
    <button slot="ar-button" style="background-color: #0071e3; color: white; border-radius: 8px; border: none; position: absolute; bottom: 16px; right: 16px; padding: 12px 24px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
        👋 Ver en Realidad Aumentada
    </button>
    
</model-viewer>

    <div class="product-info">
        <h3>Prototipo: Elemento Decorativo Interactivo</h3>
        <p>Precio: S/. 180.00</p>
        <button class="btn-compra">Añadir al carrito</button>
    </div>
</div>

</body>
</html>
